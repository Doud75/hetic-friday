---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-products
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: seed
          image: postgres:17-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              PGHOST=$RDS_HOST \
              PGPORT=$RDS_PORT \
              PGDATABASE=$RDS_DB_NAME \
              PGUSER=$RDS_USER \
              PGPASSWORD=$RDS_PASSWORD \
              PGSSLMODE=$RDS_SSLMODE \
              psql -f /sql/seed.sql
          envFrom:
            - secretRef:
                name: rds-credentials
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: sql
          configMap:
            name: seed-products-sql
