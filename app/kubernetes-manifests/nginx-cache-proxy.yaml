apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-cache-proxy-config
data:
  nginx.conf: |
    worker_processes auto;
    events {
      worker_connections 4096;
    }

    http {
      # Zone de cache partagée entre tous les workers Nginx (et donc tous les users)
      # 10m = taille de la zone mémoire pour les métadonnées des clés
      # max_size=512m = taille max du cache disque
      # inactive=60s = clé purgée si non accédée pendant 60s
      proxy_cache_path /tmp/nginx_cache
                       levels=1:2
                       keys_zone=BOUTIQUE_CACHE:10m
                       max_size=512m
                       inactive=1h
                       use_temp_path=off;

      # Buffers généreux pour les images
      proxy_buffers          16 64k;
      proxy_buffer_size      64k;
      proxy_busy_buffers_size 128k;
      proxy_temp_file_write_size 128k;

      # Compression gzip pour CSS/JS/SVG
      gzip              on;
      gzip_types        text/css application/javascript image/svg+xml text/html;
      gzip_comp_level   4;
      gzip_min_length   1024;
      gzip_proxied      any;
      gzip_vary         on;

      log_format cache_log '$remote_addr - [$time_local] "$request" '
                           '$status $upstream_cache_status';
      access_log /dev/stdout cache_log;
      error_log  /dev/stderr warn;

      server {
        listen 80;

        # Désactiver le cache pour les routes mutables
        set $no_cache 0;
        if ($request_method = POST)       { set $no_cache 1; }
        if ($request_uri ~* "^/cart")     { set $no_cache 1; }
        if ($request_uri ~* "^/checkout") { set $no_cache 1; }
        if ($request_uri ~* "^/set-currency") { set $no_cache 1; }
        if ($request_uri ~* "^/logout")   { set $no_cache 1; }
        if ($request_uri ~* "^/_healthz") { set $no_cache 1; }

        # ---- Assets statiques : images, CSS, JS, fonts ----
        # TTL long : ces fichiers ne changent qu'à chaque redéploiement
        location ~* ^/static/ {
          proxy_pass http://frontend:80;

          proxy_cache              BOUTIQUE_CACHE;
          proxy_cache_valid        200 1h;
          proxy_cache_use_stale    error timeout updating http_500 http_502 http_503;
          proxy_cache_background_update on;
          proxy_cache_lock         on;
          proxy_cache_lock_timeout 5s;
          proxy_ignore_headers     Cache-Control Set-Cookie;

          proxy_hide_header Cache-Control;
          add_header Cache-Control "public, max-age=3600";  # cache navigateur 1h aussi
          add_header X-Cache-Status $upstream_cache_status always;

          proxy_set_header Host            $host;
          proxy_set_header X-Real-IP       $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

          proxy_connect_timeout 5s;
          proxy_read_timeout    60s;
        }

        # ---- Pages dynamiques : TTL court ----
        location / {
          proxy_pass http://frontend:80;

          proxy_cache              BOUTIQUE_CACHE;
          proxy_cache_valid        200 2m;
          proxy_cache_use_stale    error timeout updating http_500 http_502 http_503;
          proxy_cache_background_update on;
          proxy_cache_lock         on;
          proxy_cache_lock_timeout 5s;
          proxy_cache_bypass       $no_cache;
          proxy_no_cache           $no_cache;
          proxy_ignore_headers     Cache-Control Set-Cookie;

          proxy_hide_header Cache-Control;
          add_header Cache-Control "no-store";
          add_header X-Cache-Status $upstream_cache_status always;

          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          proxy_connect_timeout 5s;
          proxy_read_timeout    60s;
        }

        # Health check dédié pour le LB (jamais caché)
        location /nginx-health {
          access_log off;
          return 200 "ok\n";
          add_header Content-Type text/plain;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-cache-proxy
  labels:
    app: nginx-cache-proxy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: nginx-cache-proxy
  template:
    metadata:
      labels:
        app: nginx-cache-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: cache-vol
              mountPath: /tmp/nginx_cache
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-cache-proxy-config
        - name: cache-vol
          emptyDir:
            sizeLimit: 512Mi
---
# Service public : remplace frontend-external
apiVersion: v1
kind: Service
metadata:
  name: nginx-cache-proxy
  labels:
    app: nginx-cache-proxy
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: nginx-cache-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-cache-proxy-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-cache-proxy
  minReplicas: 10
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
